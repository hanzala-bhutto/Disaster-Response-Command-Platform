apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: disaster-response
spec:
  clusterIP: None
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: broker
    - name: controller
      port: 9093
      targetPort: controller
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: disaster-response
spec:
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: broker
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: disaster-response
spec:
  serviceName: kafka-headless
  replicas: 3
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: bitnami/kafka:3.8.0
          command:
            - /bin/bash
            - -ec
          args:
            - |
              export POD_ORDINAL="${HOSTNAME##*-}"
              export KAFKA_CFG_NODE_ID="${POD_ORDINAL}"
              export KAFKA_KRAFT_CLUSTER_ID="MkU3OEVBNTcwNTJENDM2Qk"
              export KAFKA_CFG_PROCESS_ROLES="broker,controller"
              export KAFKA_CFG_CONTROLLER_QUORUM_VOTERS="0@kafka-0.kafka-headless:9093,1@kafka-1.kafka-headless:9093,2@kafka-2.kafka-headless:9093"
              export KAFKA_CFG_LISTENERS="PLAINTEXT://:9092,CONTROLLER://:9093"
              export KAFKA_CFG_ADVERTISED_LISTENERS="PLAINTEXT://${HOSTNAME}.kafka-headless:9092"
              export KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP="PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
              export KAFKA_CFG_CONTROLLER_LISTENER_NAMES="CONTROLLER"
              export KAFKA_CFG_INTER_BROKER_LISTENER_NAME="PLAINTEXT"
              export KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE="true"
              export KAFKA_CFG_DEFAULT_REPLICATION_FACTOR="3"
              export KAFKA_CFG_MIN_INSYNC_REPLICAS="2"
              export KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR="3"
              export KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR="3"
              export KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR="2"
              export ALLOW_PLAINTEXT_LISTENER="yes"
              exec /opt/bitnami/scripts/kafka/entrypoint.sh /opt/bitnami/scripts/kafka/run.sh
          ports:
            - containerPort: 9092
              name: broker
            - containerPort: 9093
              name: controller
          volumeMounts:
            - name: data
              mountPath: /bitnami/kafka
          readinessProbe:
            tcpSocket:
              port: broker
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: broker
            initialDelaySeconds: 45
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
