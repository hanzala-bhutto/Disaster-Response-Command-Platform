apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-web
  namespace: disaster-response
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-web
  template:
    metadata:
      labels:
        app: frontend-web
    spec:
      containers:
        - name: frontend-web
          image: disaster-response/frontend-web:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-web
  namespace: disaster-response
spec:
  selector:
    app: frontend-web
  ports:
    - name: http
      port: 80
      targetPort: http
