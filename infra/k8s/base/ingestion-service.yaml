apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: disaster-response
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      containers:
        - name: ingestion-service
          image: disaster-response/ingestion-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8006
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: disaster-response
spec:
  selector:
    app: ingestion-service
  ports:
    - name: http
      port: 8006
      targetPort: http
