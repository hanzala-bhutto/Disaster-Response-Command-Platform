apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: disaster-response
data:
  KAFKA_BOOTSTRAP_SERVERS: kafka-0.kafka-headless:9092,kafka-1.kafka-headless:9092,kafka-2.kafka-headless:9092
  INCIDENT_CREATED_TOPIC: incident.created
  TASK_CREATED_TOPIC: task.created
  COORDINATION_CONSUMER_GROUP: coordination-service
  NOTIFICATION_CONSUMER_GROUP: notification-service
  QDRANT_URL: http://qdrant:6333
  QDRANT_COLLECTION_NAME: disaster_knowledge
  EMBEDDING_SIZE: "128"
  CHUNK_SIZE_WORDS: "120"
  CHUNK_OVERLAP_WORDS: "30"
  INCIDENT_SERVICE_URL: http://incident-service:8001
  COORDINATION_SERVICE_URL: http://coordination-service:8002
  NOTIFICATION_SERVICE_URL: http://notification-service:8003
  RAG_SERVICE_URL: http://rag-service:8004
  AI_ORCHESTRATOR_URL: http://ai-orchestrator:8005
  LLM_BASE_URL: https://api.openai.com/v1
  LLM_MODEL: gpt-4.1-mini
