apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: disaster-response
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
    spec:
      containers:
        - name: rag-service
          image: disaster-response/rag-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8004
              name: http
          envFrom:
            - configMapRef:
                name: platform-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: disaster-response
spec:
  selector:
    app: rag-service
  ports:
    - name: http
      port: 8004
      targetPort: http
