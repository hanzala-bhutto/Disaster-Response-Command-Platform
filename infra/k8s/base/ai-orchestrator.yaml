apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-orchestrator
  namespace: disaster-response
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-orchestrator
  template:
    metadata:
      labels:
        app: ai-orchestrator
    spec:
      containers:
        - name: ai-orchestrator
          image: disaster-response/ai-orchestrator:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8005
              name: http
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ai-orchestrator
  namespace: disaster-response
spec:
  selector:
    app: ai-orchestrator
  ports:
    - name: http
      port: 8005
      targetPort: http
