apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: disaster-response
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: api-gateway
        metrics_path: /metrics
        static_configs:
          - targets:
              - api-gateway:8000

      - job_name: incident-service
        metrics_path: /metrics
        static_configs:
          - targets:
              - incident-service:8001

      - job_name: coordination-service
        metrics_path: /metrics
        static_configs:
          - targets:
              - coordination-service:8002

      - job_name: notification-service
        metrics_path: /metrics
        static_configs:
          - targets:
              - notification-service:8003

      - job_name: rag-service
        metrics_path: /metrics
        static_configs:
          - targets:
              - rag-service:8004

      - job_name: ai-orchestrator
        metrics_path: /metrics
        static_configs:
          - targets:
              - ai-orchestrator:8005

      - job_name: ingestion-service
        metrics_path: /metrics
        static_configs:
          - targets:
              - ingestion-service:8006

      - job_name: qdrant
        metrics_path: /metrics
        static_configs:
          - targets:
              - qdrant:6333

      - job_name: rabbitmq-exporter
        metrics_path: /metrics
        static_configs:
          - targets:
              - rabbitmq-exporter:9419
