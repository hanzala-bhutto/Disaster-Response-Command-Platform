apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-platform
  namespace: disaster-response
data:
  disaster-response-platform.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (service) (rate(platform_http_requests_total{path!=\"/metrics\"}[5m]))",
              "legendFormat": "{{service}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "HTTP request rate",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "histogram_quantile(0.95, sum by (le, service) (rate(platform_http_request_duration_seconds_bucket{path!=\"/metrics\"}[5m])))",
              "legendFormat": "{{service}} p95",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "HTTP latency p95",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (service, routing_key) (rate(platform_events_published_total[5m]))",
              "legendFormat": "published {{service}} {{routing_key}}",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "sum by (service, routing_key) (rate(platform_events_consumed_total[5m]))",
              "legendFormat": "consumed {{service}} {{routing_key}}",
              "range": true,
              "refId": "B"
            }
          ],
          "title": "Event throughput",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 8
          },
          "id": 4,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (workflow_type, mode) (rate(platform_ai_workflow_runs_total[5m]))",
              "legendFormat": "{{workflow_type}} / {{mode}}",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "histogram_quantile(0.95, sum by (le, workflow_type, mode) (rate(platform_ai_workflow_duration_seconds_bucket[5m])))",
              "legendFormat": "{{workflow_type}} {{mode}} p95",
              "range": true,
              "refId": "B"
            }
          ],
          "title": "AI workflow throughput and latency",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 8
          },
          "id": 5,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "platform_incidents_in_store",
              "legendFormat": "incidents",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "platform_tasks_in_store",
              "legendFormat": "tasks",
              "range": true,
              "refId": "B"
            },
            {
              "editorMode": "code",
              "expr": "platform_notifications_in_store",
              "legendFormat": "notifications",
              "range": true,
              "refId": "C"
            },
            {
              "editorMode": "code",
              "expr": "platform_rag_documents_in_store",
              "legendFormat": "documents",
              "range": true,
              "refId": "D"
            },
            {
              "editorMode": "code",
              "expr": "platform_ai_workflow_history_size",
              "legendFormat": "workflow history",
              "range": true,
              "refId": "E"
            }
          ],
          "title": "In-memory entity counts",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 16
          },
          "id": 6,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (job) (up)",
              "legendFormat": "{{job}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Scrape health",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 16
          },
          "id": 7,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(kafka_brokers)",
              "legendFormat": "kafka brokers",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "sum(kafka_topic_partitions)",
              "legendFormat": "topic partitions",
              "range": true,
              "refId": "B"
            },
            {
              "editorMode": "code",
              "expr": "sum by (topic) (kafka_topic_partition_current_offset)",
              "legendFormat": "offset {{topic}}",
              "range": true,
              "refId": "C"
            }
          ],
          "title": "Kafka broker and topic activity",
          "type": "timeseries"
        }
      ],
      "refresh": "15s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "disaster-response",
