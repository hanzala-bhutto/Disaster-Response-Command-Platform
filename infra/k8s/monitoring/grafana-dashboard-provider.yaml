apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: disaster-response
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: disaster-response-platform
        orgId: 1
        folder: Disaster Response Platform
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
