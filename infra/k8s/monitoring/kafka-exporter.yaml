apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: disaster-response
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
    spec:
      containers:
        - name: kafka-exporter
          image: danielqsj/kafka-exporter:v1.7.0
          args:
            - --kafka.server=kafka:9092
          ports:
            - containerPort: 9308
              name: http
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: disaster-response
spec:
  selector:
    app: kafka-exporter
  ports:
    - name: http
      port: 9308
      targetPort: http
