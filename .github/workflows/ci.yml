name: Platform CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

  backend-tests:
    name: Backend Tests (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            path: services/api-gateway
          - name: incident-service
            path: services/incident-service
          - name: coordination-service
            path: services/coordination-service
          - name: notification-service
            path: services/notification-service
          - name: ingestion-service
            path: services/ingestion-service
          - name: rag-service
            path: services/rag-service
          - name: ai-orchestrator
            path: services/ai-orchestrator
    defaults:
      run:
        working-directory: ${{ matrix.service.path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install service and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r ../../requirements-test.txt

      - name: Run pytest
        run: pytest -q tests

  python-validation:
    name: Python Service Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Python service source
        run: python scripts/ci/validate_python_services.py

  k8s-manifests:
    name: Kubernetes Manifest Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Render base manifests
        run: kubectl kustomize infra/k8s/base > /tmp/base-manifests.yaml

      - name: Render monitoring manifests
        run: kubectl kustomize infra/k8s/monitoring > /tmp/monitoring-manifests.yaml

  container-images:
    name: Container Build (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    needs:
      - frontend-e2e
      - backend-tests
      - python-validation
      - k8s-manifests
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: web
            image_name: disaster-response-web
            context: frontend/web
            dockerfile: frontend/web/Dockerfile
          - name: api-gateway
            image_name: api-gateway
            context: services/api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - name: incident-service
            image_name: incident-service
            context: services/incident-service
            dockerfile: services/incident-service/Dockerfile
          - name: coordination-service
            image_name: coordination-service
            context: services/coordination-service
            dockerfile: services/coordination-service/Dockerfile
          - name: notification-service
            image_name: notification-service
            context: services/notification-service
            dockerfile: services/notification-service/Dockerfile
          - name: ingestion-service
            image_name: ingestion-service
            context: services/ingestion-service
            dockerfile: services/ingestion-service/Dockerfile
          - name: rag-service
            image_name: rag-service
            context: services/rag-service
            dockerfile: services/rag-service/Dockerfile
          - name: ai-orchestrator
            image_name: ai-orchestrator
            context: services/ai-orchestrator
            dockerfile: services/ai-orchestrator/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.image_name }}
          tags: |
            type=sha
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') }}

      - name: Log in to GHCR
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally publish image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: ${{ github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
